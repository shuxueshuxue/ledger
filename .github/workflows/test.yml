name: test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m venv .venv
      - run: .venv/bin/python -m pip install --upgrade pip
      - run: .venv/bin/python -m pip install -e .
      - run: .venv/bin/python -m unittest discover
      - run: .venv/bin/python -m py_compile ledger_agent/cli.py
      - run: .venv/bin/ledger --help
      - run: .venv/bin/ledger wait --help
